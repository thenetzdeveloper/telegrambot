<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TikTok Downloader</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; padding: 16px; text-align:center; }
    input { width: 90%; padding:10px; margin-top:10px; }
    button { padding:10px 16px; margin-top:10px; }
    #result { margin-top:16px; }
    video { width: 95%; max-width:600px; margin-top: 8px; }
  </style>
</head>
<body>
  <h2>🎵 TikTok Downloader</h2>
  <div>
    <input id="link" placeholder="Paste TikTok link here">
    <div>
      <button id="downloadBtn">Download</button>
    </div>
    <div id="result"></div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    // Optionally use tg.initData and styling
    document.getElementById('downloadBtn').addEventListener('click', async () => {
      const url = document.getElementById('link').value.trim();
      if (!url) return alert('Paste a TikTok link');

      document.getElementById('result').innerText = 'Fetching...';

      try {
        const resp = await fetch(`/api/download?url=${encodeURIComponent(url)}`);
        const data = await resp.json();

        // adjust according to API response
        const videoUrl = (data && (data.video?.noWatermark || data.video?.url || data.download)) || null;
        if (videoUrl) {
          document.getElementById('result').innerHTML = `<video src="${videoUrl}" controls></video>
            <div><a href="${videoUrl}" download target="_blank">Open / Save</a></div>`;
        } else {
          document.getElementById('result').innerText = 'No downloadable link found. Check console for API response.';
          console.log(data);
        }
      } catch (err) {
        console.error(err);
        document.getElementById('result').innerText = 'Error fetching video.';
      }
    });
  </script>
</body>
</html>
